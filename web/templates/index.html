<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markify</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <span class="logo">MARKIFY</span>
    <span class="tagline">Document → Markdown</span>
  </header>

  <main>
    <section class="drop-section">
      <div id="dropZone" class="drop-zone">
        <div class="drop-icon">✦</div>
        <p>Drop files here or <span class="browse-link" onclick="document.getElementById('fileInput').click()">browse</span></p>
        <p class="formats">.docx .pptx .xlsx .pdf .txt .csv .rtf</p>
        <input type="file" id="fileInput" multiple accept=".docx,.doc,.pptx,.ppt,.xlsx,.xls,.pdf,.txt,.csv,.rtf" style="display:none">
      </div>
    </section>

    <section id="queueSection" class="queue-section hidden">
      <div id="fileQueue" class="file-queue"></div>
      <div class="queue-actions">
        <button id="convertAllBtn" class="btn-primary">Convert All →</button>
        <button id="downloadZipBtn" class="btn-secondary hidden">Download All as ZIP</button>
      </div>
    </section>

    <section id="previewSection" class="preview-section hidden">
      <div class="preview-header">
        <span class="panel-label">PREVIEW</span>
        <div class="preview-actions">
          <button class="btn-sm" id="toggleRawBtn">Raw Markdown</button>
          <button class="btn-sm" id="copyBtn">Copy</button>
          <button class="btn-sm" id="downloadMdBtn">Download .md</button>
        </div>
      </div>
      <div id="previewContent" class="preview-content"></div>
      <textarea id="rawContent" class="raw-content hidden" readonly></textarea>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
